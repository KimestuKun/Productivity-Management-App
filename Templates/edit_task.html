{% extends "base.html" %}

{% block content %}

<h2>Edit Task</h2>

<form method="POST">

    <input type="text" name="title" value="{{ task[1] }}">

    <br><br>

    <input type="text" name="description" value="{{ task[2] }}">

    <br><br>

    <input type="number" name="priority" value="{{ task[3] }}">

    <br><br>

    <input type="date" name="deadline" value="{{ task[4] }}">

    <br><br>

    <button type="submit">Save Changes</button>

</form>

{% endblock %}
